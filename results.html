<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Resultados en vivo — Concurso de Arte Marymount">
  <title>Resultados — Concurso de Arte Marymount</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <img src="images/logo_Marymount.png" alt="Marymount School Logo">
      </div>
      <div class="header-text">
        <h1>Concurso de Arte</h1>
        <p>Colegio Marymount Medellín</p>
      </div>
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="container container--wide" style="padding-top: 24px;">

    <!-- Results header (navy card) -->
    <div class="results-header-card">
      <div class="results-header-row">
        <h2 class="results-title">
          Resultados en Vivo
        </h2>
        <span id="status-badge" class="status-badge loading">
          <span class="status-dot"></span>Cargando...
        </span>
      </div>
      <div class="results-meta-row">
        <div class="voter-count-badge">
          <!-- users icon -->
          <svg viewBox="0 0 24 24">
            <path d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
          </svg>
          <span id="voter-count">— votantes</span>
        </div>
        <span id="last-updated" class="last-updated">Actualizando...</span>
      </div>
      <p style="font-size:0.78rem; opacity:0.5; margin-top:10px;">
        Se actualiza automáticamente cada 30 segundos.
        &nbsp;·&nbsp; Puntuación: 1° = 3 pts &nbsp;·&nbsp; 2° = 2 pts &nbsp;·&nbsp; 3° = 1 pt
      </p>
    </div>

    <!-- Category podiums injected here by app.js -->
    <div id="results-categories"></div>

    <!-- CTA to vote -->
    <div class="text-center" style="padding-bottom: 56px; margin-top: 8px;">
      <a href="index.html" class="btn btn-primary">
        <svg viewBox="0 0 24 24">
          <path d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/>
        </svg>
        Emitir mi Voto
      </a>
    </div>

  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    ResultsPage.init();
  </script>
</body>
</html>
